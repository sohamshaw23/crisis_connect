<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRISIS CONNECT | Resource Planning</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Rajdhani:wght@500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  
  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

  <!-- Shared Styles -->
  <link rel="stylesheet" href="css/base.css?v=3.2">
  <link rel="stylesheet" href="css/layout.css?v=3.2">
  
  <!-- Page Specific Styles -->
  <link rel="stylesheet" href="css/resources.css?v=3.2">
  <!-- Tom Select -->
  <link href="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/css/tom-select.css" rel="stylesheet">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="nav-left">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><polyline points="2,12 5,12 6.5,8 8,15 9.5,9 11,14 12,12 14,12 22,12"/>
      </svg>
      <h1><span class="brand-crisis">CRISIS</span><span class="brand-connect">CONNECT</span></h1>
    </div>
    <div class="nav-center">
      <input type="text" class="search-input" placeholder="Search disasters, regions...">
    </div>
    <div class="nav-right">
      <div class="live-status">
        <div class="live-dot"></div>
        LIVE
      </div>
    </div>
    <div class="nav-right-extra">
      <span class="mono" id="nav-user"></span>
      <button onclick="ccLogout()">⏏ LOGOUT</button>
    </div>
  </nav>

  <div class="app-shell">
    <!-- Sidebar -->
    <aside class="sidebar">
      <a href="dashboard.html?v=3.2" class="sidebar-btn" title="Dashboard">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="9"></rect><rect x="14" y="3" width="7" height="5"></rect><rect x="14" y="12" width="7" height="9"></rect><rect x="3" y="16" width="7" height="5"></rect></svg>
      </a>
      <a href="disaster.html?v=3.2" class="sidebar-btn" title="Disasters">
        <svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
      </a>
      <a href="displacement.html?v=3.2" class="sidebar-btn" title="Displacement">
        <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
      </a>
      <a href="resources.html?v=3.2" class="sidebar-btn active" title="Resources">
        <svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
      </a>
      <a href="secondary-risk.html?v=3.2" class="sidebar-btn" title="Risk">
        <svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
      </a>
      <a href="simulate.html?v=3.2" class="sidebar-btn" title="Simulate">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><polygon points="10 8 16 12 10 16 10 8"></polygon></svg>
      </a>
      <a href="analytics.html?v=3.2" class="sidebar-btn" title="Analytics">
        <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
      </a>
      <a href="alerts.html?v=3.2" class="sidebar-btn" title="Alerts">
        <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
      </a>
      <a href="emergency.html?v=3.2" class="sidebar-btn" title="Emergency" style="margin-top:auto; margin-bottom: 10px;">
        <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>
      </a>
    </aside>

    <!-- Main Content -->
    <div class="main-content">
      
      <!-- Leaflet Map Area -->
      <div id="map"></div>
      
      <!-- Map Legend -->
      <div class="map-legend">
        <div class="legend-title">SHELTER CAPACITY</div>
        <div class="legend-item"><div class="sys-sq sq-green"></div> >60% Spaces Available</div>
        <div class="legend-item"><div class="sys-sq sq-amber"></div> 30-60% Spaces Available</div>
        <div class="legend-item"><div class="sys-sq sq-red"></div> <30% Available (CRITICAL)</div>
      </div>
      
      <!-- Right Detail Panel -->
      <div class="right-panel">
        <div class="panel-header">
          <h2>RESOURCE PLANNING</h2>
          <select id="event-selector" class="event-selector">
            <option value="">Loading events...</option>
          </select>
        </div>

        <div class="panel-content">
          
          <div>
            <h3 class="section-title">CAPACITY OVERVIEW</h3>
            <div class="resource-list" id="global-bars">
              <!-- JS Filled -->
            </div>
          </div>

          <div>
            <h3 class="section-title">CRITICAL GAPS</h3>
            <div class="alert-list" id="alert-list">
              <!-- JS Filled -->
            </div>
          </div>

          <div>
            <h3 class="section-title">NEAREST SUPPLY ZONES</h3>
            <div class="zone-list">
              <!-- Dynamically populated by JS based on ML hotspots -->
            </div>
          </div>

          <a href="#" class="req-btn" id="btn-request-resources">
            <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            REQUEST RESOURCES
          </a>

        </div>
      </div>
    </div>
  </div>

  <!-- Status Bar -->
  <div class="status-bar">
    <div>LAST UPDATED: <span id="timestamp" class="data-font"></span></div>
    <div>CRISISCONNECT v1.0 | VIEW : LOGISTICS & RESOURCES</div>
  </div>

  <!-- Auth Script -->
  <script src="js/api.js"></script>
  <script src="js/auth.js?v=3.2"></script>

  <!-- Page Logic -->
  <script src="js/api.js"></script>
  <script src="js/resources.js?v=3.2"></script>
  <script src="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/js/tom-select.complete.min.js"></script>
</body>
</html>
